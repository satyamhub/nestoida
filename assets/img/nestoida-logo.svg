<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Nestoida Logo</title>
  <desc id="desc">Animated home and location marker logo for Nestoida</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff385c"/>
      <stop offset="100%" stop-color="#e31c5f"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <style>
      .pulse {
        transform-origin: 60px 60px;
        animation: pulse 2.4s ease-in-out infinite;
      }
      .float {
        transform-origin: 60px 60px;
        animation: float 2.8s ease-in-out infinite;
      }
      .ring {
        transform-origin: 60px 60px;
        animation: ring 2.6s ease-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.92; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      @keyframes ring {
        0% { transform: scale(0.82); opacity: 0.45; }
        70% { transform: scale(1.15); opacity: 0; }
        100% { transform: scale(1.15); opacity: 0; }
      }
    </style>
  </defs>

  <circle class="ring" cx="60" cy="60" r="34" fill="none" stroke="url(#g2)" stroke-width="4"/>
  <g class="float">
    <path class="pulse" d="M60 15c-18 0-32 13.5-32 31 0 19.8 16.6 36.4 28.5 53.1a4.1 4.1 0 0 0 7 0C75.4 82.4 92 65.8 92 46c0-17.5-14-31-32-31z" fill="url(#g1)"/>
    <path d="M42 50.5 60 35l18 15.5v16.8a2.7 2.7 0 0 1-2.7 2.7h-8.8V56.8h-13V70h-8.8a2.7 2.7 0 0 1-2.7-2.7V50.5z" fill="#fff"/>
    <path d="M37.5 49.5 60 30.8l22.5 18.7" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="4.5"/>
  </g>
</svg>
